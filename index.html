<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剛好系列-校園排課系統</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- html2pdf.js CDN for direct PDF generation and download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <!-- docx.js CDN for generating true binary DOCX documents natively in the browser -->
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 摺疊過渡與流暢滾動條 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* 彈出對話框動畫 */
    @keyframes scaleUp {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-scale-up {
      animation: scaleUp 0.18s ease-out forwards;
    }

    /* 列印與 PDF 匯出排版設定 */
    @media print {
      body {
        background-color: white !important;
        color: black !important;
      }
      /* 隱藏主應用程式介面與左下角浮動按鈕 */
      #root, .fixed {
        display: none !important;
      }
      /* 呈現專屬列印區 */
      #print-section {
        display: block !important;
      }
      .page-break {
        page-break-after: always;
        break-after: page;
      }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div id="root"></div>

  <!-- 專為列印與另存 PDF 設計的隱藏容器 -->
  <div id="print-section" class="hidden"></div>

  <!-- React 應用程式本體 -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // 自訂安全 SVG 圖示 (避免外部 CSP 阻擋 icon)
    const Icon = ({ name, className = "w-5 h-5" }) => {
      const icons = {
        Settings: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />,
        Clock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />,
        BookOpen: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />,
        Users: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />,
        CalendarDays: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 3V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />,
        Copy: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />,
        Check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />,
        Play: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />,
        Upload: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />,
        Plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" />,
        Trash2: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />,
        Info: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
        Save: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />,
        FolderOpen: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9l-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />,
        AlertCircle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />,
        GripVertical: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5h.01M12 12h.01M12 19h.01M12 5h.01M12 12h.01M12 19h.01M8 5h.01M8 12h.01M8 19h.01M16 5h.01M16 12h.01M16 19h.01" />,
        UserPlus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />,
        BookCopy: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />,
        Sparkles: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />,
        Download: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />,
        Printer: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-4a2 2 0 00-2-2H9v4a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />,
        Edit: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      };
      return (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          {icons[name] || <path d="M12 9v2m0 4h.01" />}
        </svg>
      );
    };

    const generateSequence = (count, style) => {
      const result = [];
      if (style === '甲乙丙') {
        const stems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸', '子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        for (let i = 0; i < count; i++) result.push(stems[i % stems.length]);
      } else if (style === '123') {
        for (let i = 1; i <= count; i++) result.push(i.toString());
      } else if (style === 'ABC') {
        for (let i = 0; i < count; i++) result.push(String.fromCharCode(65 + (i % 26)));
      }
      return result;
    };

    function App() {
      // ================= 1. 核心狀態宣告 (useState) =================
      const [activeTab, setActiveTab] = useState(1);
      const fileInputRef = useRef(null);
      const [toast, setToast] = useState(null); 
      
      const [copiedCoursePrompt, setCopiedCoursePrompt] = useState(false);
      const [copiedTeacherPrompt, setCopiedTeacherPrompt] = useState(false);
      const [copiedAssignPrompt, setCopiedAssignPrompt] = useState(false);
      
      // 階段一：年級與班級
      const [grades, setGrades] = useState([]);
      const [newGradeInput, setNewGradeInput] = useState('');
      const [newClassInputs, setNewClassInputs] = useState({});
      const [batchClassConfig, setBatchClassConfig] = useState({});

      // 階段二：時間框架
      const [timeConfig, setTimeConfig] = useState({ days: 5, periodsPerDay: 7 });

      // 階段三：課程與教師計畫
      const [step3Tab, setStep3Tab] = useState('courses'); 
      
      // 3.1 課程計畫
      const [coursePlans, setCoursePlans] = useState({}); 
      const [newCourseInputs, setNewCourseInputs] = useState({});
      const [csvCourseInput, setCsvCourseInput] = useState('');

      // 3.2 教師名單 & 導師職務 & 不可排課設定
      const [teachers, setTeachers] = useState([]);
      const [homerooms, setHomerooms] = useState({}); 
      const [teacherBusyTimes, setTeacherBusyTimes] = useState({}); 
      const [busyTimesTarget, setBusyTimesTarget] = useState(null); 
      const [newTeacherInput, setNewTeacherInput] = useState('');
      const [csvTeacherInput, setCsvTeacherInput] = useState('');

      // 3.3 手動拖曳配課 & 拆分功能狀態
      const [assignments, setAssignments] = useState([]);
      const [csvInput, setCsvInput] = useState('');
      const [customSplits, setCustomSplits] = useState({}); 
      const [splitTarget, setSplitTarget] = useState(null); 
      const [splitInputs, setSplitInputs] = useState([]); 

      // 拖曳配課教師篩選器狀態 (單一教師選擇)
      const [selectedTeacherFilter, setSelectedTeacherFilter] = useState('');
      
      // 待分配課程複選框勾選 UIDs
      const [selectedCourseUids, setSelectedCourseUids] = useState([]);
      const [batchTargetTeacher, setBatchTargetTeacher] = useState('');

      // 拖曳暫存狀態
      const [dragOverTeacher, setDragOverTeacher] = useState(null);
      
      // 階段四：排課引擎 & 結果呈現
      const [schedule, setSchedule] = useState(null);
      const [isScheduling, setIsScheduling] = useState(false);
      const [scheduleStats, setScheduleStats] = useState({ total: 0, placed: 0, conflicts: 0 });
      const [timetableOption, setTimetableOption] = useState('class'); 
      const [editingCell, setEditingCell] = useState(null); 
      const [previewTimetable, setPreviewTimetable] = useState(null);
      const [gradeOffTimesTarget, setGradeOffTimesTarget] = useState(null);
      const [manualPlacementTarget, setManualPlacementTarget] = useState(null);
      const [selectedPlacementSlot, setSelectedPlacementSlot] = useState(null);

      // ================= 2. 記憶化計算宣告 (useMemo) =================
      // 將 memory 屬性移到頂部，徹底消除 TDZ (Temporal Dead Zone) 造成 pendingCourses / filteredTeachersForDrag 未宣告錯誤
      
      // 計算手動拖曳與批次指派用待分配課程清單 (支援動態拆分與導師稱謂)
      const pendingCourses = useMemo(() => {
        let pending = [];
        grades.forEach(g => {
          const plans = coursePlans[g.name] || [];
          g.classes.forEach(c => {
            plans.forEach(p => {
              if (p.hours <= 0) return;
              
              const splitKey = `${g.name}-${c}-${p.subject}`;
              const splits = customSplits[splitKey];
              
              if (splits && splits.length > 0) {
                splits.forEach(sub => {
                  const isAssigned = assignments.some(a => a.grade === g.name && a.className === c && a.subject === sub.subject);
                  if (!isAssigned) {
                    pending.push({
                      uid: `${g.name}-${c}-${p.subject}-${sub.subject}`,
                      grade: g.name,
                      className: c,
                      subject: sub.subject,
                      hours: sub.hours,
                      isSubCourse: true,
                      originalSubject: p.subject
                    });
                  }
                });
              } else {
                const isAssigned = assignments.some(a => a.grade === g.name && a.className === c && a.subject === p.subject);
                if (!isAssigned) {
                  pending.push({
                    uid: `${g.name}-${c}-${p.subject}`,
                    grade: g.name,
                    className: c,
                    subject: p.subject,
                    hours: p.hours,
                    isSubCourse: false
                  });
                }
              }
            });
          });
        });
        return pending;
      }, [grades, coursePlans, assignments, customSplits]);

      // 智慧連動：一旦待分配課程發生變動，將不再處於 pending 狀態的 UIDs 從勾選列表中剔除
      const computedPendingUids = useMemo(() => {
        return pendingCourses.map(c => c.uid);
      }, [pendingCourses]);

      // 全校可用班級清單計算
      const allAvailableClasses = useMemo(() => {
        const list = [];
        grades.forEach(g => {
          g.classes.forEach(c => {
            list.push({ grade: g.name, className: c, label: `${g.name} ${c}` });
          });
        });
        return list;
      }, [grades]);

      // 依據篩選選單過濾教師
      const filteredTeachersForDrag = useMemo(() => {
        if (!selectedTeacherFilter) return teachers;
        return teachers.filter(t => t === selectedTeacherFilter);
      }, [teachers, selectedTeacherFilter]);

      // 根據篩選器包裝過濾名單
      const filteredTeachersForDragWrapper = useMemo(() => {
        return filteredTeachersForDrag;
      }, [filteredTeachersForDrag]);

      // 按教師呈現功課表矩陣重整
      const scheduleByTeacher = useMemo(() => {
        if (!schedule) return {};
        const teacherMap = {};
        
        teachers.forEach(t => {
          teacherMap[t] = Array(timeConfig.days).fill(null).map(() => Array(timeConfig.periodsPerDay).fill(null));
        });

        for (const gradeName in schedule) {
          for (const className in schedule[gradeName]) {
            const classMatrix = schedule[gradeName][className];
            for (let day = 0; day < timeConfig.days; day++) {
              for (let period = 0; period < timeConfig.periodsPerDay; period++) {
                const cell = classMatrix[day][period];
                if (cell && teacherMap[cell.teacher]) {
                  teacherMap[cell.teacher][day][period] = {
                    subject: cell.subject,
                    grade: gradeName,
                    className: className
                  };
                }
              }
            }
          }
        }
        return teacherMap;
      }, [schedule, teachers, timeConfig]);

      // ================= 3. 副作用處理 (useEffect) =================
      useEffect(() => {
        if (toast) {
          const timer = setTimeout(() => setToast(null), 4000);
          return () => clearTimeout(timer);
        }
      }, [toast]);

      useEffect(() => {
        if (selectedTeacherFilter && !teachers.includes(selectedTeacherFilter)) {
          setSelectedTeacherFilter('');
        }
      }, [teachers, selectedTeacherFilter]);

      useEffect(() => {
        setSelectedCourseUids(prev => prev.filter(uid => computedPendingUids.includes(uid)));
      }, [computedPendingUids]);

      useEffect(() => {
        setPreviewTimetable(null);
      }, [editingCell]);

      useEffect(() => {
        setSelectedPlacementSlot(null);
      }, [manualPlacementTarget]);

      const unplacedLessons = useMemo(() => {
        if (!schedule) return [];
        
        // 1. 統計課表內各配課已排入的節數
        const placedCounts = {};
        for (const gradeName in schedule) {
          for (const className in schedule[gradeName]) {
            const classMatrix = schedule[gradeName][className];
            for (let d = 0; d < timeConfig.days; d++) {
              for (let p = 0; p < timeConfig.periodsPerDay; p++) {
                const cell = classMatrix[d][p];
                if (cell) {
                  const key = `${gradeName}-${className}-${cell.subject}-${cell.teacher}`;
                  placedCounts[key] = (placedCounts[key] || 0) + 1;
                }
              }
            }
          }
        }
        
        // 2. 對照配課計畫的應排節數，計算未排入節數
        const unplaced = [];
        assignments.forEach(assign => {
          const key = `${assign.grade}-${assign.className}-${assign.subject}-${assign.teacher}`;
          const placedCount = placedCounts[key] || 0;
          const diff = assign.hours - placedCount;
          if (diff > 0) {
            unplaced.push({
              assignmentId: assign.id,
              grade: assign.grade,
              className: assign.className,
              subject: assign.subject,
              teacher: assign.teacher,
              hours: diff
            });
          }
        });
        
        return unplaced;
      }, [assignments, schedule, timeConfig]);

      useEffect(() => {
        if (!schedule) return;
        
        let total = 0;
        assignments.forEach(assign => {
          total += assign.hours;
        });
        
        let placed = 0;
        for (const gradeName in schedule) {
          for (const className in schedule[gradeName]) {
            const classMatrix = schedule[gradeName][className];
            for (let d = 0; d < timeConfig.days; d++) {
              for (let p = 0; p < timeConfig.periodsPerDay; p++) {
                if (classMatrix[d][p]) {
                  placed++;
                }
              }
            }
          }
        }
        
        const conflicts = Math.max(0, total - placed);
        setScheduleStats({ total, placed, conflicts });
      }, [schedule, assignments, timeConfig]);

      const TabButton = ({ step, icon, label }) => (
        <button onClick={() => setActiveTab(step)}
          className={`flex-1 flex items-center justify-center py-3 px-4 rounded-xl transition-all duration-200 whitespace-nowrap gap-2 ${
            activeTab === step 
              ? 'bg-white text-blue-700 font-extrabold shadow-sm scale-[1.02]' 
              : 'text-slate-600 hover:bg-slate-200/60 hover:text-slate-800'
          }`}
        >
          {icon({ className: "w-5 h-5" })}
          <span className="text-sm md:text-base font-bold">{label}</span>
        </button>
      );

      // ================= 5. 事件與工具函式 (Helpers) =================
      const showToast = (message, type = 'success') => setToast({ message, type });

      const getTeacherLabel = (teacherName) => {
        const hr = homerooms[teacherName];
        return hr ? `${teacherName} (${hr.grade}${hr.className}導師)` : teacherName;
      };

      const handleExportProject = () => {
        try {
          const projectData = { grades, timeConfig, coursePlans, teachers, homerooms, teacherBusyTimes, assignments, schedule, scheduleStats, customSplits };
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData));
          const downloadAnchorNode = document.createElement('a');
          downloadAnchorNode.setAttribute("href", dataStr);
          downloadAnchorNode.setAttribute("download", `排課計畫_${new Date().toLocaleDateString().replace(/\//g, '')}.json`);
          document.body.appendChild(downloadAnchorNode);
          downloadAnchorNode.click();
          downloadAnchorNode.remove();
          showToast("專案已成功備份並開始下載！");
        } catch (error) {
          showToast("匯出失敗，請重試。", "error");
        }
      };

      const handleImportProject = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const d = JSON.parse(e.target.result);
            if (d.grades) {
              setGrades((d.grades || []).map(g => ({ ...g, offTimes: g.offTimes || {} })));
              setTimeConfig(d.timeConfig || { days: 5, periodsPerDay: 7 });
              setCoursePlans(d.coursePlans || {});
              setTeachers(d.teachers || []);
              setHomerooms(d.homerooms || {});
              setTeacherBusyTimes(d.teacherBusyTimes || {});
              setAssignments(d.assignments || []);
              setCustomSplits(d.customSplits || {});
              setSchedule(d.schedule !== undefined ? d.schedule : null);
              setScheduleStats(d.scheduleStats || { total: 0, placed: 0, conflicts: 0 });
              showToast("專案備份檔載入成功！");
            } else {
              showToast("檔案格式錯誤，無法載入此 JSON。", "error");
            }
          } catch (error) {
            showToast("檔案解析失敗，請確認檔案完好。", "error");
          }
        };
        reader.readAsText(file);
        event.target.value = '';
      };

      const addGrade = () => {
        const name = newGradeInput.trim();
        if (!name || grades.some(g => g.name === name)) return; 
        setGrades(prev => [...prev, { name, classes: [], offTimes: {} }]);
        setNewGradeInput('');
      };
      
      const removeGrade = (index) => setGrades(prev => prev.filter((_, i) => i !== index));

                    bold: !!item.bold,
                    color: item.color || "111827",

                alignment: docxObj.AlignmentType?.CENTER || "center",
                spacing: { before: 40, after: 40 }
              }));
            });

            paragraphs.push(new Paragraph({
              children: [
                new TextRun({
                  text: String(text),
                  bold: !!options.bold,
                  color: options.color || "111827",
                  size: options.size || 20
                })
              ],
              alignment: docxObj.AlignmentType?.CENTER || "center",

                  left: { style: docxObj.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" },

                  insideHorizontal: { style: docxObj.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" },
                  insideVertical: { style: docxObj.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" }
                }
              }));
            });
          });
        } else {
          // teacher option
          teachers.forEach((teacher) => {
            const teacherMatrix = scheduleByTeacher[teacher];
            if (!teacherMatrix) return;
            const totalHours = teacherMatrix.flat().filter(Boolean).length;

            // Title Header
            children.push(new docxObj.Paragraph({
              children: [new docxObj.TextRun({ text: `${getTeacherLabel(teacher)} 教師個人課表`, bold: true, size: 32, color: "0f172a" })],
              alignment: docxObj.AlignmentType?.CENTER || "center",
              spacing: { before: isFirstPage ? 0 : 240, after: 100 },
              pageBreakBefore: !isFirstPage
            }));
            isFirstPage = false;

            // Subtitle
            children.push(new docxObj.Paragraph({
              children: [new docxObj.TextRun({ text: `每週授課: ${totalHours} 節  |  出表時間: ${new Date().toLocaleDateString()}`, bold: true, size: 18, color: "64748b" })],
              alignment: docxObj.AlignmentType?.RIGHT || "right",
              spacing: { after: 120 }
            }));

            // Rows list
            const tableRows = [];

            // Table Header Row
            const headerCells = [createCell("節次 \\ 星期", { bold: true, color: "ffffff", fill: "0f172a", size: 22 })];
            for (let i = 0; i < timeConfig.days; i++) headerCells.push(createCell(`星期${weekdays[i] || (i + 1)}`, { bold: true, color: "ffffff", fill: "0f172a", size: 22 }));
            tableRows.push(new docxObj.TableRow({ children: headerCells, height: { value: 600, rule: docxObj.HeightRule?.ATLEAST || "atLeast" } }));

            // Body Rows
            for (let pIndex = 0; pIndex < timeConfig.periodsPerDay; pIndex++) {
              if (pIndex === 4 || (timeConfig.periodsPerDay > 7 && pIndex === 5 && timeConfig.periodsPerDay !== 8)) {
                tableRows.push(new docxObj.TableRow({
                  children: [createCell("中午休息時間", { bold: true, color: "d97706", fill: "fffbeb", size: 20, columnSpan: timeConfig.days + 1 })],
                  height: { value: 400, rule: docxObj.HeightRule?.ATLEAST || "atLeast" }
                }));
              }

              const cells = [createCell(`第 ${pIndex + 1} 節`, { bold: true, color: "475569", fill: "f8fafc", size: 20 })];
              for (let dIndex = 0; dIndex < timeConfig.days; dIndex++) {
                const cell = teacherMatrix[dIndex][pIndex];
                const isBusy = !!(teacherBusyTimes[teacher]?.[`${dIndex}-${pIndex}`]);
                if (isBusy) cells.push(createCell("", { fill: "fef2f2" }));
                else if (cell) cells.push(createCell([
                  { text: cell.subject, bold: true, color: "111827", size: 22 },
                  { text: `${cell.grade}${cell.className}`, bold: true, color: "4b5563", size: 19 }
                ], { fill: "f3f4f6" }));
                else cells.push(createCell("-", { color: "cbd5e1", size: 20 }));
              }
              tableRows.push(new docxObj.TableRow({ children: cells, height: { value: 900, rule: docxObj.HeightRule?.ATLEAST || "atLeast" } }));
            }

            // Create Table
            children.push(new docx.Table({
              rows: tableRows,
              width: { size: 100, type: docx.WidthType?.PERCENTAGE || "pct" },
              borders: {
                top: { style: docx.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" },
                bottom: { style: docx.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" },
                left: { style: docx.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" },
                right: { style: docx.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" },
                insideHorizontal: { style: docx.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" },
                insideVertical: { style: docx.BorderStyle?.SINGLE || "single", size: 4, color: "cbd5e1" }
              }
            }));
          });
        }

        const doc = new docx.Document({
          sections: [{
            properties: {
              page: {
                size: { width: 16838, height: 11906 },
                orientation: "landscape",
                margin: { top: 720, bottom: 720, left: 720, right: 720 }
              }
            },
            children: children
          }]
        });

        showToast("Word DOCX 正在排版並生成中，請稍候...", "success");

        docx.Packer.toBlob(doc).then((blob) => {
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.setAttribute("href", url);
          const prefix = option === 'class' ? "班級功課表" : "教師個人課表";
          link.setAttribute("download", `${prefix}_${new Date().toLocaleDateString().replace(/\//g, '')}.docx`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          showToast("Word DOCX 課表已成功下載！");
        }).catch(err => {
          console.error("docx.js packaging failed:", err);
          showToast("docx 封裝失敗，請重試。", "error");
        });
      };

      const toggleBusyTimeForTeacher = (teacherName, day, period) => {
        const key = `${day}-${period}`;
        setTeacherBusyTimes(prev => {
          const teacherMap = prev[teacherName] || {};
          const isBusy = !!teacherMap[key];
          
          const nextMap = { ...teacherMap };
          if (isBusy) {
            delete nextMap[key];
          } else {
            nextMap[key] = true;
          }
          
          return {
            ...prev,
            [teacherName]: nextMap
          };
        });
      };

      const toggleBusyTime = (day, period) => {
        if (!busyTimesTarget) return;
        toggleBusyTimeForTeacher(busyTimesTarget, day, period);
      };

      const clearAllBusyTimes = () => {
        if (!busyTimesTarget) return;
        setTeacherBusyTimes(prev => {
          const next = { ...prev };
          delete next[busyTimesTarget];
          return next;
        });
        showToast(`已清除 ${busyTimesTarget} 的所有不可排課時間！`);
      };

      const handleDragStart = (e, course) => {
        e.dataTransfer.setData('application/json', JSON.stringify(course));
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleDropToTeacher = (e, teacherName) => {
        e.preventDefault();
        setDragOverTeacher(null);
        try {
          const course = JSON.parse(e.dataTransfer.getData('application/json'));
          setAssignments(prev => [...prev, {
            id: Date.now() + Math.random(),
            teacher: teacherName, 
            grade: course.grade, 
            className: course.className, 
            subject: course.subject, 
            hours: course.hours
          }]);
        } catch (err) { console.error("Drop failed", err); }
      };

      const handleDragOverContainer = (e) => {
        if (!selectedTeacherFilter) return;
        e.preventDefault();
        setDragOverTeacher(selectedTeacherFilter);
      };

      const handleDragLeaveContainer = () => {
        setDragOverTeacher(null);
      };

      const handleDropContainer = (e) => {
        if (!selectedTeacherFilter) return;
        handleDropToTeacher(e, selectedTeacherFilter);
      };

      const handleToggleSelectCourse = (uid) => {
        setSelectedCourseUids(prev => 
          prev.includes(uid) ? prev.filter(id => id !== uid) : [...prev, uid]
        );
      };

      const handleSelectAllPending = () => {
        if (selectedCourseUids.length === pendingCourses.length) {
          setSelectedCourseUids([]);
        } else {
          setSelectedCourseUids(pendingCourses.map(c => c.uid));
        }
      };

      const handleBatchAssign = () => {
        if (!batchTargetTeacher || selectedCourseUids.length === 0) return;
        const coursesToAssign = pendingCourses.filter(c => selectedCourseUids.includes(c.uid));
        
        setAssignments(prev => {
          const newAssigns = [...prev];
          coursesToAssign.forEach((course, index) => {
            newAssigns.push({
              id: Date.now() + index + Math.random(),
              teacher: batchTargetTeacher,
              grade: course.grade,
              className: course.className,
              subject: course.subject,
              hours: course.hours
            });
          });
          return newAssigns;
        });
        
        setSelectedCourseUids([]);
        showToast(`成功批次指派 ${coursesToAssign.length} 門學科給 ${batchTargetTeacher}！`);
      };

      const removeAssignment = (id) => {
        const assign = assignments.find(a => a.id === id);
        if (assign) {
          if (schedule) {
            const nextSchedule = JSON.parse(JSON.stringify(schedule));
            let modified = false;
            const classSchedule = nextSchedule[assign.grade]?.[assign.className];
            if (classSchedule) {
              for (let d = 0; d < timeConfig.days; d++) {
                for (let p = 0; p < timeConfig.periodsPerDay; p++) {
                  const cell = classSchedule[d]?.[p];
                  if (cell && cell.subject === assign.subject && cell.teacher === assign.teacher) {
                    classSchedule[d][p] = null;
                    modified = true;
                  }
                }
              }
            }
            if (modified) setSchedule(nextSchedule);
          }
          setAssignments(prev => prev.filter(a => a.id !== id));
          showToast(`已成功將「${assign.subject}」課程退回未分配清單！`);
        }
      };

      const openSplitModal = (course) => {
        const key = `${course.grade}-${course.className}-${course.subject}`;
        const existingSplits = customSplits[key];
        
        setSplitTarget(course);
        if (existingSplits && existingSplits.length > 0) {
          setSplitInputs(existingSplits.map(s => ({ subject: s.subject, hours: s.hours })));
        } else {
          setSplitInputs([
            { subject: `${course.subject}A`, hours: Math.ceil(course.hours / 2) },
            { subject: `${course.subject}B`, hours: Math.floor(course.hours / 2) }
          ]);
        }
      };

      const handleRestoreSplit = (course) => {
        const key = `${course.grade}-${course.className}-${course.subject}`;
        
        // Also check if any assignments are made using the split sub-courses, and delete them
        const subCourses = customSplits[key] || [];
        const subSubjects = subCourses.map(s => s.subject);
        
        setAssignments(prev => prev.filter(a => {
          if (a.grade === course.grade && a.className === course.className && subSubjects.includes(a.subject)) {
            return false;
          }
          return true;
        }));
        
        // Clear them from schedule if they were scheduled
        if (schedule) {
          const nextSchedule = JSON.parse(JSON.stringify(schedule));
          let modified = false;
          const classSchedule = nextSchedule[course.grade]?.[course.className];
          if (classSchedule) {
            for (let d = 0; d < timeConfig.days; d++) {
              for (let p = 0; p < timeConfig.periodsPerDay; p++) {
                const cell = classSchedule[d]?.[p];
                if (cell && subSubjects.includes(cell.subject)) {
                  classSchedule[d][p] = null;
                  modified = true;
                }
              }
            }
          }
          if (modified) setSchedule(nextSchedule);
        }

        setCustomSplits(prev => {
          const nextSplits = { ...prev };
          delete nextSplits[key];
          return nextSplits;
        });
        
        showToast(`已成功取消「${course.subject}」的拆分設定！`);
      };

      const handleImportCSV = () => {
        if (!csvInput.trim()) return;
        const lines = csvInput.trim().split('\n');
        const newAssignments = [];
        lines.forEach((line, index) => {
          if (line.startsWith('教師姓名,') || line.trim() === '') return;
          const parts = line.split(',');
          if (parts.length >= 5) {
            newAssignments.push({
              id: Date.now() + index + Math.random(),
              teacher: parts[0].trim(), grade: parts[1].trim(), className: parts[2].trim(), subject: parts[3].trim(), hours: parseInt(parts[4].trim(), 10) || 0,
            });
            if (!teachers.includes(parts[0].trim())) setTeachers(prev => [...prev, parts[0].trim()]);
          }
        });
        setAssignments(prev => [...prev, ...newAssignments]);
        setCsvInput('');
        showToast(`配課結果匯入完成，成功建立 ${newAssignments.length} 筆配課關係！`);
      };

      const runAIScheduling = () => {
        // 檢查是否已設定各年級不上課節數/時段
        const totalOffPeriods = grades.reduce((sum, g) => sum + Object.keys(g.offTimes || {}).length, 0);
        if (totalOffPeriods === 0 && grades.length > 0) {
          const confirmSchedule = confirm("您尚未為任何年級設定「不上課節數（不上課時段）」，所有年級將預設為全部時間皆上課。確定要直接排課嗎？\n\n(建議先至「步驟一：年級與班級」點擊各年級旁的「設定不上課時段」，如低年級下午放學不上課，才可以排出正確課表。)");
          if (!confirmSchedule) {
            return;
          }
        }

        setIsScheduling(true);
        setSchedule(null);
        setTimeout(() => {
          const newSchedule = {};
          grades.forEach(g => {
            newSchedule[g.name] = {};
            g.classes.forEach(c => {
              newSchedule[g.name][c] = Array(timeConfig.days).fill(null).map(() => Array(timeConfig.periodsPerDay).fill(null));
            });
          });
          let totalLessons = 0, placedLessons = 0, conflicts = 0;
          let lessonsToSchedule = [];
          
          assignments.forEach(assign => {
            for (let i = 0; i < assign.hours; i++) {
              lessonsToSchedule.push({ ...assign });
              totalLessons++;
            }
          });
          
          lessonsToSchedule.sort(() => Math.random() - 0.5);

          lessonsToSchedule.forEach(lesson => {
            let placed = false;
            if (!newSchedule[lesson.grade] || !newSchedule[lesson.grade][lesson.className]) { conflicts++; return; }
            
            const startDay = Math.floor(Math.random() * timeConfig.days);
            const startPeriod = Math.floor(Math.random() * timeConfig.periodsPerDay);

            for (let i = 0; i < timeConfig.days && !placed; i++) {
              const day = (startDay + i) % timeConfig.days;
              for (let j = 0; j < timeConfig.periodsPerDay && !placed; j++) {
                const period = (startPeriod + j) % timeConfig.periodsPerDay;
                const gradeObj = grades.find(g => g.name === lesson.grade);
                const isGradeOff = !!(gradeObj?.offTimes?.[`${day}-${period}`]);

                if (!isGradeOff && newSchedule[lesson.grade][lesson.className][day][period] === null) {
                  const busyKey = `${day}-${period}`;
                  const isTeacherBusy = !!(teacherBusyTimes[lesson.teacher]?.[busyKey]);
                  
                  let teacherConflict = isTeacherBusy;
                  
                  if (!teacherConflict) {
                    for (const g in newSchedule) {
                      for (const c in newSchedule[g]) {
                        const existingLesson = newSchedule[g][c][day][period];
                        if (existingLesson && existingLesson.teacher === lesson.teacher) {
                          teacherConflict = true;
                        }
                      }
                    }
                  }
                  
                  if (!teacherConflict) {
                    newSchedule[lesson.grade][lesson.className][day][period] = { subject: lesson.subject, teacher: lesson.teacher };
                    placed = true; 
                    placedLessons++;
                  }
                }
              }
            }
            if (!placed) conflicts++;
          });
          setSchedule(newSchedule);
          setScheduleStats({ total: totalLessons, placed: placedLessons, conflicts });
          setIsScheduling(false);
          showToast(conflicts > 0 ? `自動排課完成！但有 ${conflicts} 堂課因教師衝堂或不可排課時段限制未能排入` : "恭喜！課表完美配對完成，且完美避開所有不可排課時段！");
        }, 1500); 
      };

      const handleAssignTargetCourse = (day, period) => {
        if (!manualPlacementTarget || !schedule) return;
        const { grade, className, teacher, subject } = manualPlacementTarget;
        
        // 檢查該時段是否為該年級的不上課時段
        const gradeObj = grades.find(g => g.name === grade);
        if (gradeObj?.offTimes?.[`${day}-${period}`]) {
          showToast(`無法指派！此時段為 ${grade} 的「不上課時段」。`, "error");
          return;
        }

        // 檢查教師不可排課時段
        const busyKey = `${day}-${period}`;
        let bypassTeacherBusy = false;
        if (teacherBusyTimes[teacher]?.[busyKey]) {
          const confirmForce = confirm(`此時段目前為教師 ${getTeacherLabel(teacher)} 的「不可排課時段」。\n是否確定要強制排入此課程，並自動取消該教師此節的不可排課設定？`);
          if (!confirmForce) return;
          bypassTeacherBusy = true;
        }

        const nextSchedule = JSON.parse(JSON.stringify(schedule));
        
        if (bypassTeacherBusy) {
          setTeacherBusyTimes(prev => {
            const teacherMap = prev[teacher] || {};
            const nextMap = { ...teacherMap };
            delete nextMap[busyKey];
            return {
              ...prev,
              [teacher]: nextMap
            };
          });
        }
        
        // 檢查教師衝堂
        let conflictClass = null;
        for (const g in nextSchedule) {
          for (const c in nextSchedule[g]) {
            if (g === grade && c === className) continue;
            const cell = nextSchedule[g][c][day][period];
            if (cell && cell.teacher === teacher) {
              conflictClass = `${g} ${c}`;
              break;
            }
          }
        }

        if (conflictClass) {
          const confirmOverride = confirm(`教師衝堂！${teacher} 此時段已在 [${conflictClass}] 授課。\n是否要強制清除 [${conflictClass}] 的課堂並排入本班？`);
          if (!confirmOverride) return;
          
          const parts = conflictClass.split(' ');
          const cg = parts[0];
          const cc = parts[1];
          nextSchedule[cg][cc][day][period] = null;
        }

        // 檢查本班該格是否已有課
        const existing = nextSchedule[grade][className][day][period];
        if (existing) {
          const confirmOverwrite = confirm(`本班此時段已有課程 [${existing.subject} (${existing.teacher})]，是否確定要覆蓋？`);
          if (!confirmOverwrite) return;
        }

        // 計算此學科在該班目前已排的堂數
        let scheduledCount = 0;
        for (let d = 0; d < timeConfig.days; d++) {
          for (let p = 0; p < timeConfig.periodsPerDay; p++) {
            const cell = nextSchedule[grade][className][d]?.[p];
            if (cell && cell.subject === subject && cell.teacher === teacher) {
              scheduledCount++;
            }
          }
        }
        
        // 取得該配課的每週總排課節數
        const origAssign = assignments.find(a => a.id === manualPlacementTarget.assignmentId);
        const limitHours = origAssign ? origAssign.hours : manualPlacementTarget.hours;

        // 若原本格子裡不是本課程，且目前排入數量已達上限，則阻擋
        const isSelfOverwrite = existing && existing.subject === subject && existing.teacher === teacher;
        if (!isSelfOverwrite && scheduledCount >= limitHours) {
          showToast(`無法排入！此課程每週設定 ${limitHours} 節已全部排滿。`, "error");
          return;
        }

        nextSchedule[grade][className][day][period] = { subject, teacher };
        setSchedule(nextSchedule);
        setSelectedPlacementSlot(null);
        showToast(`已成功將 ${subject} 排入 ${grade} ${className} 的星期${['一','二','三','四','五','六'][day]} 第 ${period + 1} 節！`);
      };

      const handleModifyCellSchedule = (targetAssignmentId) => {
        if (!editingCell || !schedule) return;
        const { type, grade, className, teacher, day, period } = editingCell;
        
        const nextSchedule = JSON.parse(JSON.stringify(schedule));

        if (targetAssignmentId === 'clear') {
          if (type === 'class') {
            nextSchedule[grade][className][day][period] = null;
          } else if (type === 'teacher') {
            const originalCell = scheduleByTeacher[teacher]?.[day]?.[period];
            if (originalCell) {
              nextSchedule[originalCell.grade][originalCell.className][day][period] = null;
            }
          }
          setSchedule(nextSchedule);
          setEditingCell(null);
          showToast("已成功清空該時段的課程！");
          return;
        }

        const assign = assignments.find(a => a.id === parseFloat(targetAssignmentId));
        if (!assign) return;

        // 檢查該時段是否為該年級的不上課時段
        const targetGrade = type === 'class' ? grade : assign.grade;
        const gradeObj = grades.find(g => g.name === targetGrade);
        if (gradeObj?.offTimes?.[`${day}-${period}`]) {
          showToast(`無法指派！此時段為 ${targetGrade} 的「不上課時段」。`, "error");
          return;
        }

        const busyKey = `${day}-${period}`;
        
        if (teacherBusyTimes[assign.teacher]?.[busyKey]) {
          showToast(`無法指派！${assign.teacher} 此時段設定為「不可排課時段」。`, "error");
          return;
        }

        let conflictClass = null;
        for (const g in nextSchedule) {
          for (const c in nextSchedule[g]) {
            if (type === 'class' && g === grade && c === className) continue;
            
            const cell = nextSchedule[g][c][day][period];
            if (cell && cell.teacher === assign.teacher) {
              conflictClass = `${g} ${c}`;
              break;
            }
          }
        }

        if (conflictClass) {
          showToast(`指派衝突！${assign.teacher} 此時段已在 [${conflictClass}] 授課中，無法指派！`, "error");
          return;
        }

        if (type === 'class') {
          // 檢查手動排入的節數是否已滿
          let scheduledCount = 0;
          for (let d = 0; d < timeConfig.days; d++) {
            for (let p = 0; p < timeConfig.periodsPerDay; p++) {
              const cell = nextSchedule[grade][className][d]?.[p];
              if (cell && cell.subject === assign.subject && cell.teacher === assign.teacher) {
                scheduledCount++;
              }
            }
          }
          const cellBefore = nextSchedule[grade][className][day][period];
          const isSelfOverwrite = cellBefore && cellBefore.subject === assign.subject && cellBefore.teacher === assign.teacher;
          if (!isSelfOverwrite && scheduledCount >= assign.hours) {
            showToast(`無法排入！此課程每週設定 ${assign.hours} 節已全部排滿。`, "error");
            return;
          }

          nextSchedule[grade][className][day][period] = {
            subject: assign.subject,
            teacher: assign.teacher
          };
        } else if (type === 'teacher') {
          // 檢查手動排入的節數是否已滿
          let scheduledCount = 0;
          for (let d = 0; d < timeConfig.days; d++) {
            for (let p = 0; p < timeConfig.periodsPerDay; p++) {
              const cell = nextSchedule[assign.grade][assign.className][d]?.[p];
              if (cell && cell.subject === assign.subject && cell.teacher === teacher) {
                scheduledCount++;
              }
            }
          }
          const cellBefore = nextSchedule[assign.grade][assign.className][day][period];
          const isSelfOverwrite = cellBefore && cellBefore.subject === assign.subject && cellBefore.teacher === teacher;
          if (!isSelfOverwrite && scheduledCount >= assign.hours) {
            showToast(`無法排入！此課程每週設定 ${assign.hours} 節已全部排滿。`, "error");
            return;
          }

          nextSchedule[assign.grade][assign.className][day][period] = {
            subject: assign.subject,
            teacher: teacher
          };
        }

        setSchedule(nextSchedule);
        setEditingCell(null);
        showToast("課表手動微調成功！");
      };

      const generateAssignAIPrompt = () => {
        if (grades.length === 0) return "請先在步驟一設定年級與班級。";

                                  for (const c in nextSchedule[g]) {
                                    const cell = nextSchedule[g][c][day][period];
                                    if (cell && cell.teacher === manualPlacementTarget.teacher) {
                                      nextSchedule[g][c][day][period] = null;
                                    }
                                  }
                                }
                                setSchedule(nextSchedule);
                                showToast("已清空教師此節授課！");
                              }}
                              className="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-xs font-bold transition-all border border-red-100"
                            >
                              🗑️ 清除教師此節
                            </button>
                          )}
                          
                          <button 
                            disabled={isClassOff}
                            onClick={() => handleAssignTargetCourse(day, period)}
                            className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-lg text-xs font-extrabold transition-all shadow-sm flex items-center gap-1"
                          >
                            🎯 填入此未排課程
                          </button>
                        </div>
                      </div>
                    );
                  })() : (
                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 text-center text-xs text-slate-500 font-bold">
                      💡 請點擊上方「班級課表」或「教師課表」中的任一時間格子來進行手動填入、覆蓋或清空。
                    </div>
                  )}
                  
                  <div className="flex justify-between items-center">
                    <span className="text-xs text-slate-400 font-bold">
                      * 點擊 <span className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-1.5 py-0.5 rounded font-extrabold">✨ 完美時段</span> 可最快排入無衝突之課程。
                    </span>
                    <button 
                      onClick={() => setManualPlacementTarget(null)}
                      className="px-5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-lg text-sm transition-colors"
                    >
                      關閉輔導視窗
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 左下角固定定位浮動專案控制面板 */}
          <div className="fixed bottom-6 left-6 z-40 flex flex-col sm:flex-row gap-3 bg-white/90 backdrop-blur-md p-3 rounded-2xl shadow-xl border border-slate-200 hover:shadow-2xl hover:border-slate-300 transition-all duration-300 animate-scale-up">
            <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleImportProject} />
            <button 
              onClick={() => fileInputRef.current.click()} 
              className="flex items-center justify-center px-4 py-2.5 text-sm font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 active:scale-95 rounded-xl transition-all border border-slate-200 shadow-sm"
              title="載入先前儲存的排課專案 (.json)"
            >
              <Icon name="FolderOpen" className="w-4 h-4 mr-2 text-slate-500" /> 載入專案
            </button>
            <button 
              onClick={handleExportProject} 
              className="flex items-center justify-center px-4 py-2.5 text-sm font-bold text-white bg-slate-800 hover:bg-slate-900 active:scale-95 rounded-xl transition-all shadow-md"
              title="將當前排課進度匯出備份 (.json)"
            >
              <Icon name="Save" className="w-4 h-4 mr-2" /> 匯出專案
            </button>
          </div>

          {/* Footer & CC 授權資訊與阿剛老師標記 */}
          <footer className="bg-slate-800 text-slate-300 py-6 mt-auto">
            <div className="max-w-6xl mx-auto px-4 flex flex-col items-center justify-center space-y-2">
              <p className="text-base font-bold text-slate-400">
                <a href="https://kentxchang.blogspot.tw" target="_blank" rel="noopener noreferrer" className="font-bold text-blue-400 hover:text-blue-300 hover:underline transition-all">
                  Made by 阿剛老師
                </a>
              </p>
              <div className="bg-slate-700/50 px-4 py-2 rounded-lg text-center mt-2 max-w-xl">
                <p className="text-sm font-medium text-slate-200 mb-1">
                  本專案採用「創用 CC 姓名標示-非商業性-相同方式分享 4.0 國際 (CC BY-NC-SA 4.0)」授權條款
                </p>
                <p className="text-xs text-slate-400 leading-relaxed">
                  您可以自由分享、複製、分發及修改本程式，唯需在使用時標示原作者「阿剛老師」之創作者資訊，且在任何情況下皆不得將本程式 or 其修改版本用於商業盈利目的。
                </p>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // React 掛載至根節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
